<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Figma Component Library</title>
  <style>
    :root {
      --bg: #f5f3ee;
      --surface: #fffdf8;
      --ink: #1f2a33;
      --muted: #6f7c86;
      --accent: #0f7c6c;
      --accent-strong: #0b5f53;
      --ring: #f6b73c;
      --line: #e7dfd2;
      --shadow: 0 18px 45px rgba(31, 42, 51, 0.12);
      --radius-lg: 18px;
      --radius-md: 12px;
      --radius-sm: 10px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "Trebuchet MS", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 10% 5%, rgba(246, 183, 60, 0.24), transparent 35%),
        radial-gradient(circle at 90% 20%, rgba(15, 124, 108, 0.2), transparent 38%),
        var(--bg);
      padding: 32px 18px 40px;
    }

    .wrap {
      max-width: 1140px;
      margin: 0 auto;
    }

    .hero {
      background: linear-gradient(140deg, #fefaf0, #f8f1e4 42%, #eef6f4);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      padding: 24px;
      box-shadow: var(--shadow);
      margin-bottom: 20px;
      animation: slide-in 500ms ease;
    }

    .hero h1 {
      margin: 0 0 8px;
      font-size: clamp(1.5rem, 3.2vw, 2.1rem);
      letter-spacing: 0.2px;
    }

    .hero p {
      margin: 0;
      color: var(--muted);
      max-width: 820px;
      line-height: 1.5;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 16px 0 22px;
    }

    .load-btn {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 10px 14px;
      background: #fff;
      color: var(--ink);
      font-size: 0.92rem;
      cursor: pointer;
    }

    .load-btn:focus-visible {
      outline: 3px solid var(--ring);
      outline-offset: 2px;
    }

    .search {
      flex: 1 1 260px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 10px 14px;
      background: #fff;
      font-size: 0.95rem;
      outline: none;
    }

    .search:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(15, 124, 108, 0.15);
    }

    .grid {
      display: grid;
      gap: 16px;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      overflow: hidden;
      box-shadow: 0 10px 20px rgba(31, 42, 51, 0.08);
      transform: translateY(6px);
      opacity: 0;
      animation: fade-up 420ms ease forwards;
    }

    .thumb {
      height: 150px;
      background: #ddd center center / cover no-repeat;
      border-bottom: 1px solid var(--line);
    }

    .content {
      padding: 14px;
    }

    .name {
      margin: 0 0 8px;
      font-size: 1rem;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin: 0 0 12px;
      padding: 0;
      list-style: none;
    }

    .tag {
      font-size: 0.75rem;
      color: #30424f;
      background: #ebf3f1;
      border: 1px solid #d5e8e3;
      border-radius: 999px;
      padding: 4px 8px;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .copy-btn {
      appearance: none;
      border: none;
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      font-size: 0.86rem;
      font-weight: 600;
      color: #fff;
      background: linear-gradient(180deg, var(--accent), var(--accent-strong));
      cursor: pointer;
      transition: transform 120ms ease, filter 120ms ease;
    }

    .copy-btn:hover {
      transform: translateY(-1px);
      filter: brightness(1.05);
    }

    .copy-btn:focus-visible {
      outline: 3px solid var(--ring);
      outline-offset: 2px;
    }

    .copy-btn:disabled {
      cursor: not-allowed;
      opacity: 0.55;
      transform: none;
    }

    .hint {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 0.82rem;
      min-height: 1.2em;
    }

    .status {
      margin-top: 16px;
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      border: 1px solid #d5e8e3;
      background: #f4fbfa;
      color: #315f57;
      font-size: 0.9rem;
    }

    .error {
      border-color: #f2d3cf;
      background: #fff4f2;
      color: #8f2f24;
    }

    .hidden {
      display: none;
    }

    @keyframes fade-up {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes slide-in {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="hero">
      <h1>My Figma Component Library</h1>
      <p>
        Keep your Figma snippets in one local JSON file. Click "Copy to Figma" on any card,
        then switch to Figma and paste with Ctrl+V.
      </p>
    </header>

    <div class="toolbar">
      <input id="searchInput" class="search" type="search" placeholder="Search by name or tag..." />
      <label class="load-btn" for="jsonPicker">Load components.json</label>
      <input id="jsonPicker" type="file" accept="application/json" hidden />
    </div>

    <div id="status" class="status hidden" role="status" aria-live="polite"></div>
    <main id="grid" class="grid" aria-label="Component list"></main>
  </div>

  <script>
    const grid = document.getElementById("grid");
    const statusEl = document.getElementById("status");
    const searchInput = document.getElementById("searchInput");
    const jsonPicker = document.getElementById("jsonPicker");

    let allComponents = [];

    function showStatus(message, isError = false) {
      statusEl.textContent = message;
      statusEl.classList.remove("hidden", "error");
      if (isError) {
        statusEl.classList.add("error");
      }
    }

    function clearStatus() {
      statusEl.classList.add("hidden");
    }

    function base64ToUint8Array(base64) {
      const clean = (base64 || "").trim();
      if (!clean) {
        return new Uint8Array();
      }
      const binary = atob(clean);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i += 1) {
        bytes[i] = binary.charCodeAt(i);
      }
      return bytes;
    }

    function buildFigmaHtmlPayload(base64, componentName) {
      const clean = (base64 || "").replace(/\s+/g, "");
      const figMeta = {
        fileKey: "local-library",
        pasteID: Date.now(),
        dataType: "scene",
        componentName: componentName || "component"
      };
      const figMetaBase64 = btoa(JSON.stringify(figMeta));

      return `<html><body><!--StartFragment--><meta charset="utf-8"><span data-metadata="<!--(figmeta)${figMetaBase64}(/figmeta)-->"></span><span data-buffer="<!--(figma)${clean}(/figma)-->"></span><!--EndFragment--></body></html>`;
    }

    async function copyToFigma(base64, componentName) {
      if (!window.ClipboardItem || !navigator.clipboard || !navigator.clipboard.write) {
        throw new Error("ClipboardItem API is not available in this browser context.");
      }

      const bytes = base64ToUint8Array(base64);
      if (!bytes.length) {
        throw new Error("No figmaDataBase64 found for this component.");
      }

      const blob = new Blob([bytes], { type: "application/x-figma" });

      // Attempt direct binary clipboard format first.
      try {
        const directItem = new ClipboardItem({ "application/x-figma": blob });
        await navigator.clipboard.write([directItem]);
        showStatus(`Copied ${componentName} as application/x-figma. Paste in Figma with Ctrl+V.`);
        return;
      } catch (directError) {
        // Some Chromium builds reject custom types. Fall back to Figma marker payload in text/html.
      }

      try {
        const htmlPayload = buildFigmaHtmlPayload(base64, componentName);
        const htmlItem = new ClipboardItem({
          "text/html": new Blob([htmlPayload], { type: "text/html" }),
          "text/plain": new Blob([componentName || "Figma component"], { type: "text/plain" })
        });
        await navigator.clipboard.write([htmlItem]);
        showStatus(`Copied ${componentName} using HTML fallback. Paste in Figma with Ctrl+V.`);
        return;
      } catch (fallbackError) {
        throw new Error(
          fallbackError && fallbackError.message
            ? fallbackError.message
            : "Clipboard write failed for both binary and HTML fallback modes."
        );
      }
    }

    function createCard(component, index) {
      const card = document.createElement("article");
      card.className = "card";
      card.style.animationDelay = `${index * 45}ms`;

      const tags = Array.isArray(component.tags) ? component.tags : [];
      const tagsMarkup = tags.map((tag) => `<li class="tag">${tag}</li>`).join("");
      const preview = component.preview || "";

      card.innerHTML = `
        <div class="thumb" style="background-image:url('${preview}');"></div>
        <div class="content">
          <h2 class="name">${component.name || "Untitled"}</h2>
          <ul class="tags">${tagsMarkup}</ul>
          <div class="actions">
            <button class="copy-btn" type="button">Copy to Figma</button>
          </div>
          <p class="hint">Writes application/x-figma to clipboard</p>
        </div>
      `;

      const button = card.querySelector(".copy-btn");
      button.addEventListener("click", async () => {
        clearStatus();
        button.disabled = true;
        const originalLabel = button.textContent;
        button.textContent = "Copying...";
        try {
          await copyToFigma(component.figmaDataBase64, component.name || "component");
          button.textContent = "Copied";
          setTimeout(() => {
            button.textContent = originalLabel;
            button.disabled = false;
          }, 950);
        } catch (err) {
          showStatus(err.message || "Failed to copy to clipboard.", true);
          button.textContent = originalLabel;
          button.disabled = false;
        }
      });

      return card;
    }

    function matchesQuery(component, query) {
      if (!query) {
        return true;
      }
      const q = query.toLowerCase();
      const name = (component.name || "").toLowerCase();
      const tags = Array.isArray(component.tags) ? component.tags.join(" ").toLowerCase() : "";
      return name.includes(q) || tags.includes(q);
    }

    function renderComponents(query = "") {
      grid.innerHTML = "";
      const filtered = allComponents.filter((component) => matchesQuery(component, query));
      if (!filtered.length) {
        const empty = document.createElement("p");
        empty.textContent = "No components match your search.";
        grid.appendChild(empty);
        return;
      }
      filtered.forEach((component, idx) => {
        grid.appendChild(createCard(component, idx));
      });
    }

    async function loadFromSelectedFile(file) {
      const text = await file.text();
      const parsed = JSON.parse(text);
      if (!Array.isArray(parsed)) {
        throw new Error("Selected JSON must be an array of components.");
      }
      allComponents = parsed;
      renderComponents(searchInput.value || "");
      showStatus(`Loaded ${allComponents.length} components from ${file.name}.`);
    }

    async function init() {
      if (window.location.protocol === "file:") {
        showStatus(
          "Local mode detected. Click 'Load components.json' and choose your file.",
          false
        );
        return;
      }

      try {
        const response = await fetch("./components.json", { cache: "no-store" });
        if (!response.ok) {
          throw new Error(`Could not load components.json (${response.status}).`);
        }
        allComponents = await response.json();
        if (!Array.isArray(allComponents)) {
          throw new Error("components.json must be a JSON array.");
        }
        renderComponents("");
      } catch (err) {
        showStatus(
          "Could not auto-load components.json. Click 'Load components.json' and select your local JSON file.",
          false
        );
      }
    }

    searchInput.addEventListener("input", (event) => {
      renderComponents(event.target.value || "");
    });

    jsonPicker.addEventListener("change", async (event) => {
      const file = event.target.files && event.target.files[0];
      if (!file) {
        return;
      }
      try {
        clearStatus();
        await loadFromSelectedFile(file);
      } catch (err) {
        showStatus(err.message || "Failed to read selected JSON file.", true);
      } finally {
        event.target.value = "";
      }
    });

    init();
  </script>
</body>
</html>
